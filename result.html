<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Result</title>

<style>
body {
  font-family: Arial;
  background: #eef2f7;
  text-align: center;
  padding: 20px;
}

.container {
  background: white;
  max-width: 400px;
  margin: auto;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

input {
  width: 90%;
  padding: 12px;
  margin: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 12px 20px;
  background: #1e40af;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

#resultBox {
  margin-top: 30px;
}
</style>

</head>
<body>

<div class="container">
<h2>Examination Result</h2>


<input type="text" id="name" placeholder="Enter Name"><br>
<input type="text" id="roll" placeholder="Enter Roll Number"><br>

<button onclick="getResult()">Get Result</button>
</div>

<div id="resultBox"></div>

<script>
function getResult() {

  var roll = document.getElementById("name").value;
  var dob = document.getElementById("roll").value;

  if(name=="" || roll==""){
    alert("Fill all details");
    return;
  }

  fetch("https://sheetdb.io/api/v1/xisitsxchstg2")
  .then(res => res.json())
  .then(data => {

    var student = data.find(s => s.Name == name && s.Roll == roll);

    if(!student){
      document.getElementById("resultBox").innerHTML =
      "<h3 style='color:red;'>Invalid Roll Number or DOB</h3>";
      return;
    }

    // Calculate
    var total = Number(student.Maths)+Number(student.Science)+Number(student.English);
    var percentage = (total/300*100).toFixed(2);

    // Division
    var division = "";
    if(percentage >= 60) division = "First Division";
    else if(percentage >= 45) division = "Second Division";
    else division = "Third Division";

    document.getElementById("resultBox").innerHTML = `

    <div style="
      max-width:800px;
      margin:auto;
      background:white;
      padding:30px;
      border-radius:10px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      text-align:left;
    ">

    <h2 style="text-align:center; color:#1e40af;">
      Secondary Examination Result
    </h2>

    <div style="display:flex; justify-content:space-between;">
      <div>
        <p><strong>Name:</strong> ${student.Name}</p>
        <p><strong>Roll:</strong> ${student.Roll}</p>
        <p><strong>DOB:</strong> ${student.DOB}</p>
      </div>

      <img src="${student.Photo}"
           style="width:100px; height:100px; border-radius:10px;">
    </div>

    <table style="width:100%; margin-top:20px; border-collapse:collapse;">
      <tr style="background:#1e40af; color:white;">
        <th>Subject</th>
        <th>Marks</th>
      </tr>
      <tr><td>Maths</td><td>${student.Maths}</td></tr>
      <tr><td>Science</td><td>${student.Science}</td></tr>
      <tr><td>English</td><td>${student.English}</td></tr>
    </table>

    <h3>Total: ${total} / 300</h3>
    <h3>Percentage: ${percentage}%</h3>
    <h3>Division: ${division}</h3>
    <h2 style="color:green;">Grade: ${student.Grade}</h2>

    <br>
    <button onclick="window.print()">Download Marksheet</button>

    </div>
    `;
  });
}
</script>

</body>
</html>
